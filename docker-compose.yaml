version: '3'

services:
  # Frontend client service
  client:
    build: ./client
    image: kimberlynangira/yolo-client:1.0.0
    container_name: yolo-client
    ports:
      - "80:80"  # Updated for nginx which runs on port 80
    depends_on:
      - backend
    networks:
      - yolo-network
    restart: unless-stopped

  # Backend API service
  backend:
    build: ./backend
    image: kimberlynangira/yolo-backend:1.0.0
    container_name: yolo-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/yolo
      - NODE_ENV=production
    networks:
      - yolo-network
    restart: unless-stopped
    command: ["node", "server.js"]  # Explicitly set command to match your Dockerfile

  # MongoDB service
  mongodb:
    image: mongo:4.4
    container_name: yolo-mongodb
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - yolo-network
    restart: unless-stopped

networks:
  yolo-network:
    driver: bridge

volumes:
  mongo-data:
