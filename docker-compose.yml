version: '3'
services:
  backend:
    image: node:14
    container_name: backend
    working_dir: /app
    volumes:
      - ./server:/app
    ports:
      - "5001:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/yolodb
    command: bash -c "npm install && npm start"
    networks:
      - ecommerce-network
  
  frontend:
    image: yolo-frontend
    container_name: frontend_fixed
    stdin_open: true
    tty: true
    ports:
      - "3002:3000"
    networks:
      - ecommerce-network
  
  mongodb:
    image: mongo:4.4
    container_name: mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    external: true

volumes:
  mongo-data:
